name: vercel-deploy

on:
  push:
    branches:
      - develop
      - main

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Node project
        id: detect_project
        run: |
          if [ -f package.json ]; then
            echo "has_package=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_package=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve deploy target
        id: target
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "vercel_environment=production" >> "$GITHUB_OUTPUT"
            echo "is_production=true" >> "$GITHUB_OUTPUT"
          else
            echo "vercel_environment=preview" >> "$GITHUB_OUTPUT"
            echo "is_production=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate Vercel secrets
        id: check_secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          missing=0
          [ -z "$VERCEL_TOKEN" ] && echo "Missing secret: VERCEL_TOKEN" && missing=1
          [ -z "$VERCEL_ORG_ID" ] && echo "Missing secret: VERCEL_ORG_ID" && missing=1
          [ -z "$VERCEL_PROJECT_ID" ] && echo "Missing secret: VERCEL_PROJECT_ID" && missing=1

          if [ "$missing" -eq 1 ]; then
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip deploy (project not initialized)
        if: steps.detect_project.outputs.has_package != 'true'
        run: |
          echo "No package.json found."
          echo "Deploy workflow is ready and will activate after project scaffolding."

      - name: Skip deploy (missing Vercel secrets)
        if: steps.detect_project.outputs.has_package == 'true' && steps.check_secrets.outputs.has_secrets != 'true'
        run: |
          echo "Vercel secrets are missing."
          echo "Set VERCEL_TOKEN, VERCEL_ORG_ID and VERCEL_PROJECT_ID in GitHub repository secrets."
          exit 1

      - name: Setup Node.js
        if: steps.detect_project.outputs.has_package == 'true' && steps.check_secrets.outputs.has_secrets == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.detect_project.outputs.has_package == 'true' && steps.check_secrets.outputs.has_secrets == 'true'
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Vercel CLI
        if: steps.detect_project.outputs.has_package == 'true' && steps.check_secrets.outputs.has_secrets == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        if: steps.detect_project.outputs.has_package == 'true' && steps.check_secrets.outputs.has_secrets == 'true'
        run: vercel pull --yes --environment=${{ steps.target.outputs.vercel_environment }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build with Vercel
        if: steps.detect_project.outputs.has_package == 'true' && steps.check_secrets.outputs.has_secrets == 'true'
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel (Preview)
        if: steps.detect_project.outputs.has_package == 'true' && steps.check_secrets.outputs.has_secrets == 'true' && steps.target.outputs.is_production != 'true'
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel (Production)
        if: steps.detect_project.outputs.has_package == 'true' && steps.check_secrets.outputs.has_secrets == 'true' && steps.target.outputs.is_production == 'true'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
