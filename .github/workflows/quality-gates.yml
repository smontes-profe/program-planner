name: quality-gates

on:
  push:
    branches:
      - develop  # Se ejecuta cuando haces push a develop
  pull_request:
    branches:
      - main 
      - develop    # Se ejecuta cuando abres/actualizas PRs hacia main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect Node project
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "has_package=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_package=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (no Node project yet)
        if: steps.detect.outputs.has_package != 'true'
        run: |
          echo "No package.json found."
          echo "Quality commands will activate automatically when the app scaffold is added."

      - name: Setup Node.js
        if: steps.detect.outputs.has_package == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: steps.detect.outputs.has_package == 'true'
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Validate required npm scripts
        if: steps.detect.outputs.has_package == 'true'
        run: node .github/scripts/validate-npm-scripts.mjs

      - name: Lint
        if: steps.detect.outputs.has_package == 'true'
        run: npm run lint

      - name: Typecheck
        if: steps.detect.outputs.has_package == 'true'
        run: npm run typecheck

      - name: Unit tests
        if: steps.detect.outputs.has_package == 'true'
        run: npm run test -- --run

      - name: Install Playwright browsers
        if: steps.detect.outputs.has_package == 'true'
        run: npx playwright install --with-deps

      - name: Accessibility tests
        if: steps.detect.outputs.has_package == 'true'
        run: npm run test:a11y

      - name: Responsive snapshots
        if: steps.detect.outputs.has_package == 'true'
        run: npm run test:responsive

      - name: Upload UI quality artifacts
        if: always() && steps.detect.outputs.has_package == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ui-quality-artifacts
          if-no-files-found: ignore
          path: |
            test-results
            playwright-report
            artifacts/responsive-snapshots
