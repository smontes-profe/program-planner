name: accessibility-check

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL de la app a testear (deja vacío para preview de deploy)"
        required: false
        default: ""

jobs:
  a11y:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build app
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'http://localhost:9999' }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'placeholder_key' }}
        run: npm run build

      - name: Start server (background)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'http://localhost:9999' }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'placeholder_key' }}
        run: |
          npm start &
          for i in $(seq 1 30); do
            if curl -s http://127.0.0.1:3000 > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            sleep 2
          done

      - name: Accessibility tests
        env:
          UI_TEST_BASE_URL: http://127.0.0.1:3000
        run: npm run test:a11y

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-report
          if-no-files-found: ignore
          path: playwright-report
